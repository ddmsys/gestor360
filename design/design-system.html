<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor360® — Design System</title>
<link rel="stylesheet" href="https://use.typekit.net/pwr2rya.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:    #1F3F7A;
    --gold:    #D4A020;
    --stone:   #8B8B8B;
    --canvas:  #E8E6E1;
    --white:   #FFFFFF;
    --ink:     #1A1A1A;
    --text:    #5A5A5A;
    --muted:   #8B8B8B;
    --border:  #D8D5CF;
    --font-display: 'gotham', sans-serif;
    --font-body:    'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: #F4F2ED;
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
  }

  /* ── DS NAV ── */
  .ds-nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--ink); color: var(--white);
    padding: 0 2rem;
    display: flex; align-items: center; gap: 0; height: 52px;
  }
  .ds-nav-brand {
    font-family: var(--font-display); font-weight: 700; font-size: 1rem;
    color: var(--white); letter-spacing: 0.02em; margin-right: 2rem;
    white-space: nowrap;
  }
  .ds-nav-brand span { color: var(--gold); }
  .ds-nav-links {
    display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .ds-nav-links::-webkit-scrollbar { display: none; }
  .ds-nav-links a {
    color: rgba(255,255,255,0.6); text-decoration: none;
    font-size: 0.8rem; font-weight: 500; padding: 0 0.875rem; height: 52px;
    display: flex; align-items: center; white-space: nowrap;
    transition: color 150ms ease;
    letter-spacing: 0.04em;
  }
  .ds-nav-links a:hover { color: var(--white); }

  /* ── DS LAYOUT ── */
  .ds-section {
    max-width: 1200px; margin: 0 auto;
    padding: 4rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  .ds-section:last-child { border-bottom: none; }
  .ds-section-label {
    font-family: var(--font-display); font-weight: 600;
    font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.5rem;
  }
  .ds-section-title {
    font-family: var(--font-display); font-weight: 700;
    font-size: 2rem; color: var(--ink);
    margin-bottom: 0.5rem; line-height: 1.15;
  }
  .ds-section-desc {
    font-family: var(--font-body); font-size: 0.95rem;
    color: var(--text); margin-bottom: 2.5rem; max-width: 560px;
  }
  .ds-grid { display: grid; gap: 1rem; }
  .ds-grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .ds-grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  .ds-grid-4 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }

  /* ── COLORS ── */
  .color-swatch {
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .color-swatch-main { height: 80px; }
  .color-swatch-info {
    background: white; padding: 0.75rem 1rem;
    font-size: 0.8rem;
  }
  .color-swatch-name {
    font-family: var(--font-display); font-weight: 700;
    font-size: 0.875rem; color: var(--ink); margin-bottom: 2px;
  }
  .color-swatch-hex { font-family: monospace; color: var(--muted); font-size: 0.78rem; }
  .color-swatch-role { color: var(--text); font-size: 0.75rem; margin-top: 2px; }

  /* ── TYPE SCALE ── */
  .type-row {
    display: flex; align-items: baseline; gap: 1.5rem;
    padding: 1.25rem 0; border-bottom: 1px solid #EFEDEA;
  }
  .type-row:last-child { border-bottom: none; }
  .type-meta { min-width: 140px; }
  .type-meta-name { font-family: var(--font-display); font-weight: 700; font-size: 0.78rem; color: var(--blue); }
  .type-meta-spec { font-size: 0.72rem; color: var(--muted); font-family: monospace; margin-top: 2px; }

  /* ── SPACING ── */
  .spacing-row {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.5rem 0;
  }
  .spacing-bar-wrap { flex: 1; }
  .spacing-bar { background: var(--blue); height: 8px; border-radius: 99px; opacity: 0.7; }
  .spacing-label { font-family: monospace; font-size: 0.8rem; min-width: 60px; color: var(--text); }
  .spacing-value { font-size: 0.78rem; color: var(--muted); min-width: 50px; text-align: right; }

  /* ── RADIUS ── */
  .radius-card {
    background: white; padding: 1.25rem;
    border: 1.5px solid var(--border);
    display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
  }
  .radius-demo { width: 64px; height: 64px; background: var(--blue); opacity: 0.15; }
  .radius-demo-border { width: 64px; height: 64px; border: 2.5px solid var(--blue); }
  .radius-label { font-family: monospace; font-size: 0.78rem; color: var(--text); text-align: center; }

  /* ── COMPONENT FRAME ── */
  .component-frame {
    background: var(--white); border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  .component-frame-inner {
    padding: 2.5rem 2rem;
    background: var(--canvas);
  }
  .component-frame-label {
    padding: 0.75rem 1.25rem; background: var(--white);
    font-family: var(--font-display); font-size: 0.75rem; font-weight: 700;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
    border-top: 1px solid var(--border);
  }

  /* ══════════════════════════════════════════
     COMPONENTES REAIS DO GESTOR360
  ══════════════════════════════════════════ */

  /* ── BUTTONS ── */
  .g-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 0.5rem; padding: 0.75rem 1.75rem;
    font-family: var(--font-display); font-weight: 700;
    font-size: 0.9375rem; letter-spacing: 0.02em;
    border: 2px solid transparent; border-radius: 6px;
    cursor: pointer; text-decoration: none;
    transition: all 200ms ease; white-space: nowrap;
    line-height: 1;
  }
  .g-btn-primary {
    background: var(--blue); color: var(--white);
    border-color: var(--blue);
  }
  .g-btn-primary:hover {
    background: #162D5E; border-color: #162D5E;
    box-shadow: 0 4px 20px rgba(31,63,122,0.35);
    transform: translateY(-1px);
  }
  .g-btn-gold {
    background: var(--gold); color: var(--white);
    border-color: var(--gold);
  }
  .g-btn-gold:hover {
    background: #B8891A; border-color: #B8891A;
    box-shadow: 0 4px 20px rgba(212,160,32,0.4);
    transform: translateY(-1px);
  }
  .g-btn-secondary {
    background: transparent; color: var(--blue);
    border-color: var(--blue);
  }
  .g-btn-secondary:hover {
    background: var(--blue); color: var(--white);
    transform: translateY(-1px);
  }
  .g-btn-ghost {
    background: transparent; color: var(--ink);
    border-color: transparent;
  }
  .g-btn-ghost:hover { background: rgba(0,0,0,0.06); }
  .g-btn-sm { padding: 0.5rem 1.25rem; font-size: 0.8125rem; }
  .g-btn-lg { padding: 1rem 2.25rem; font-size: 1.0625rem; }

  /* ── BADGE ── */
  .g-badge {
    display: inline-flex; align-items: center;
    padding: 0.2rem 0.65rem;
    border-radius: 99px; font-family: var(--font-display);
    font-weight: 600; font-size: 0.7rem; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .g-badge-blue { background: rgba(31,63,122,0.1); color: var(--blue); }
  .g-badge-gold { background: rgba(212,160,32,0.15); color: #A87C10; }
  .g-badge-stone { background: rgba(139,139,139,0.12); color: #606060; }

  /* ── HEADER ── */
  .g-header {
    background: var(--white); border-bottom: 1px solid var(--border);
    height: 72px; display: flex; align-items: center;
    padding: 0 2rem; gap: 2rem;
  }
  .g-header-logo {
    display: flex; align-items: center; gap: 0.75rem;
    text-decoration: none;
  }
  .g-logo-digits {
    display: flex; align-items: center;
    font-family: var(--font-display); font-weight: 700;
    font-size: 1.5rem; line-height: 1; letter-spacing: -0.02em;
  }
  .g-logo-digits .d3 { color: var(--stone); }
  .g-logo-digits .d6 { color: var(--blue); }
  .g-logo-digits .d0 { color: var(--gold); }
  .g-logo-text {
    font-family: var(--font-display); font-weight: 700;
    font-size: 1rem; color: var(--ink); letter-spacing: 0.04em;
  }
  .g-logo-text small {
    display: block; font-weight: 300; font-size: 0.65rem;
    color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
    margin-top: -1px;
  }
  .g-header-nav {
    display: flex; gap: 0; margin-left: auto; align-items: center;
  }
  .g-header-nav a {
    font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
    color: var(--text); text-decoration: none; padding: 0 1rem; height: 72px;
    display: flex; align-items: center;
    transition: color 150ms ease; position: relative;
  }
  .g-header-nav a::after {
    content: ''; position: absolute; bottom: 0; left: 1rem; right: 1rem;
    height: 2px; background: var(--blue); border-radius: 99px;
    transform: scaleX(0); transition: transform 200ms ease;
  }
  .g-header-nav a:hover { color: var(--blue); }
  .g-header-nav a:hover::after { transform: scaleX(1); }
  .g-header-cta { margin-left: 1rem; }

  /* ── HERO ── */
  .g-hero {
    background: var(--canvas); padding: 5rem 2rem;
    display: grid; gap: 3rem; align-items: center;
  }
  @media(min-width: 768px) {
    .g-hero { grid-template-columns: 1fr 380px; padding: 6rem 3rem; }
  }
  .g-hero-eyebrow {
    font-family: var(--font-display); font-weight: 600;
    font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--blue); margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .g-hero-eyebrow::before {
    content: ''; width: 24px; height: 2px; background: var(--blue);
    display: inline-block; border-radius: 99px;
  }
  .g-hero-title {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(2.5rem, 6vw, 4.25rem); line-height: 1.05;
    letter-spacing: -0.02em; color: var(--ink);
    margin-bottom: 1.25rem;
  }
  .g-hero-title em { font-style: normal; color: var(--blue); }
  .g-hero-subtitle {
    font-family: var(--font-body); font-size: 1.125rem;
    color: var(--text); line-height: 1.65; max-width: 520px;
    margin-bottom: 2rem;
  }
  .g-hero-subtitle strong { color: var(--ink); font-weight: 600; }
  .g-hero-actions { display: flex; gap: 0.875rem; flex-wrap: wrap; }
  .g-hero-book {
    position: relative; display: flex; justify-content: center;
  }
  .g-hero-book-img {
    width: 220px; border-radius: 6px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2), 0 8px 20px rgba(0,0,0,0.1);
    transform: rotate(2deg);
  }
  .g-hero-stat {
    position: absolute; bottom: -10px; left: 0;
    background: var(--white); border-radius: 8px; padding: 0.875rem 1.125rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12); text-align: center;
  }
  .g-hero-stat-num {
    font-family: var(--font-display); font-weight: 700; font-size: 1.75rem;
    color: var(--gold); line-height: 1;
  }
  .g-hero-stat-label { font-size: 0.7rem; color: var(--text); margin-top: 2px; }

  /* ── TOOL CARD ── */
  .g-tool-card {
    background: var(--white); border-radius: 12px;
    border: 1px solid var(--border); overflow: hidden;
    transition: all 250ms ease;
  }
  .g-tool-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    border-color: rgba(31,63,122,0.3);
  }
  .g-tool-card-top {
    padding: 1.5rem 1.5rem 1rem;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .g-tool-chapter-badge {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700; font-size: 1rem;
    color: var(--white); flex-shrink: 0;
  }
  .g-tool-card-lock {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(139,139,139,0.1);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 0.75rem;
  }
  .g-tool-card-body { padding: 0 1.5rem 1.5rem; }
  .g-tool-card-cap {
    font-family: var(--font-display); font-weight: 600;
    font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.35rem;
  }
  .g-tool-card-name {
    font-family: var(--font-display); font-weight: 700;
    font-size: 1.0625rem; color: var(--ink); margin-bottom: 0.5rem;
    line-height: 1.25;
  }
  .g-tool-card-desc {
    font-size: 0.8375rem; color: var(--text); line-height: 1.55;
    margin-bottom: 1.25rem;
  }
  .g-tool-card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 1rem; border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
  }
  .g-tool-card-format {
    font-size: 0.72rem; color: var(--muted); font-weight: 500;
    display: flex; align-items: center; gap: 0.3rem;
  }

  /* ── TESTIMONIAL CARD ── */
  .g-testimonial {
    background: var(--white); border-radius: 12px;
    padding: 2rem; border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .g-testimonial::before {
    content: '"'; position: absolute; top: 1rem; right: 1.5rem;
    font-family: var(--font-display); font-weight: 700; font-size: 6rem;
    color: var(--blue); opacity: 0.06; line-height: 1;
  }
  .g-testimonial-stars {
    display: flex; gap: 0.2rem; margin-bottom: 1rem;
    color: var(--gold); font-size: 0.875rem;
  }
  .g-testimonial-text {
    font-family: var(--font-body); font-size: 0.9375rem;
    color: var(--text); line-height: 1.7; margin-bottom: 1.5rem;
    font-style: italic;
  }
  .g-testimonial-author {
    display: flex; align-items: center; gap: 0.875rem;
  }
  .g-testimonial-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--canvas); border: 2px solid var(--border);
    flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700;
    font-size: 1rem; color: var(--blue);
  }
  .g-testimonial-name {
    font-family: var(--font-display); font-weight: 700;
    font-size: 0.9rem; color: var(--ink);
  }
  .g-testimonial-role { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

  /* ── FORM ── */
  .g-form { display: flex; flex-direction: column; gap: 1rem; }
  .g-form-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .g-form-label {
    font-family: var(--font-display); font-weight: 700;
    font-size: 0.8rem; color: var(--ink); letter-spacing: 0.04em;
  }
  .g-form-label span { color: var(--muted); font-weight: 400; }
  .g-form-input {
    padding: 0.75rem 1rem; border-radius: 6px;
    border: 1.5px solid var(--border); background: var(--white);
    font-family: var(--font-body); font-size: 0.9375rem; color: var(--ink);
    transition: border-color 150ms ease, box-shadow 150ms ease;
    outline: none; width: 100%;
  }
  .g-form-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(31,63,122,0.12);
  }
  .g-form-input::placeholder { color: #B5B2AC; }
  .g-form-hint { font-size: 0.75rem; color: var(--muted); }
  .g-form-submit { margin-top: 0.5rem; width: 100%; justify-content: center; }

  /* ── FOOTER ── */
  .g-footer {
    background: var(--ink); color: rgba(255,255,255,0.7);
    padding: 3rem 2rem 1.5rem;
  }
  .g-footer-grid {
    display: grid; gap: 2rem; max-width: 1000px; margin: 0 auto;
    margin-bottom: 2.5rem;
  }
  @media(min-width: 768px) {
    .g-footer-grid { grid-template-columns: 1.5fr 1fr 1fr; }
  }
  .g-footer-brand-text {
    font-family: var(--font-body); font-size: 0.875rem;
    line-height: 1.65; color: rgba(255,255,255,0.55);
    margin-top: 0.875rem; max-width: 280px;
  }
  .g-footer-col-title {
    font-family: var(--font-display); font-weight: 600;
    font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); margin-bottom: 1rem;
  }
  .g-footer-links { display: flex; flex-direction: column; gap: 0.5rem; }
  .g-footer-links a {
    font-size: 0.875rem; color: rgba(255,255,255,0.65);
    text-decoration: none; transition: color 150ms ease;
  }
  .g-footer-links a:hover { color: var(--white); }
  .g-footer-bottom {
    max-width: 1000px; margin: 0 auto;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 0.5rem;
  }
  .g-footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.35); }

  /* ── DS CHIP ── */
  .ds-chip {
    display: inline-flex; align-items: center;
    padding: 0.2rem 0.6rem; border-radius: 4px;
    font-family: monospace; font-size: 0.72rem;
    background: rgba(31,63,122,0.08); color: var(--blue);
  }

  /* ── DIVIDER ── */
  .ds-divider { height: 1px; background: var(--border); margin: 2rem 0; }

  /* ── SHADOW DEMOS ── */
  .shadow-demo {
    background: white; border-radius: 10px; padding: 1.5rem;
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  }
  .shadow-box { width: 60px; height: 60px; background: white; border-radius: 8px; }
  .shadow-label { font-family: monospace; font-size: 0.72rem; color: var(--text); }
</style>
</head>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "fontPairing": "outfit",
  "heroBackground": "canvas",
  "primaryColor": "#1F3F7A",
  "accentColor": "#D4A020",
  "borderRadius": "lg"
}/*EDITMODE-END*/;

/* ── helpers ── */
const chapterColors = [
  '#1F3F7A','#2E6B8A','#2D7A4F','#7A2D5C','#8A5C2E',
  '#5C2D7A','#2D5C7A','#7A4A2D','#2D7A6B','#1A3A6B'
];

function Logo() {
  return (
    <a href="#" className="g-header-logo">
      <div className="g-logo-digits">
        <span className="d3">3</span>
        <span className="d6">6</span>
        <span className="d0">0</span>
      </div>
      <div className="g-logo-text">
        oGESTOR
        <small>método de liderança</small>
      </div>
    </a>
  );
}

  --color-text-title:   #1A1A1A;
  --color-text-body:    #5A5A5A;
  --color-text-muted:   #8B8B8B;

  /* Tipografia */
  --font-display:  'gotham', sans-serif;
  --font-body:     'DM Sans', sans-serif;

  /* Raios */
  --radius-sm: 0.25rem;  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;  --radius-xl: 1rem;
  --radius-full: 9999px;

  /* Sombras */
  --shadow-sm:   0 2px 8px 0 oklch(0% 0 0 / 0.08);
  --shadow-md:   0 4px 20px 0 oklch(0% 0 0 / 0.10);
  --shadow-blue: 0 4px 20px 0 oklch(30% 0.12 260 / 0.25);
  --shadow-gold: 0 4px 20px 0 oklch(65% 0.12 70 / 0.30);
}`}</pre>
        </div>
      </div>

      {/* TWEAKS */}
      <TweaksPanel>
        <TweakSection label="Tipografia">
          <TweakRadio id="fontPairing" label="Par tipográfico" options={['gotham','outfit']} labels={['Gotham / DM Sans','Outfit / Inter']} value={tweaks.fontPairing} onChange={v=>setTweak('fontPairing',v)} />
        </TweakSection>
        <TweakSection label="Cores">
          <TweakColor id="primaryColor" label="Cor primária (Azul)" value={tweaks.primaryColor} onChange={v=>setTweak('primaryColor',v)} />
          <TweakColor id="accentColor" label="Cor acento (Dourado)" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)} />
        </TweakSection>
        <TweakSection label="Forma">
          <TweakRadio id="borderRadius" label="Border Radius" options={['sm','md','lg','xl']} labels={['4px','8px','12px','16px']} value={tweaks.borderRadius} onChange={v=>setTweak('borderRadius',v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app-root'));
root.render(<App />);
</script>
